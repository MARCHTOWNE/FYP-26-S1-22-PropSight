{% extends "base.html" %}
{% block title %}Login — PropSight{% endblock %}

{% block extra_head %}
<style>
    .premium-auth-shell {
        min-height: calc(100vh - 220px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 56px 16px;
        background: radial-gradient(circle at 0% 0%, rgba(37, 99, 235, 0.06), transparent 42%),
                    radial-gradient(circle at 100% 100%, rgba(15, 23, 42, 0.06), transparent 45%),
                    #f8fafc;
    }

    .premium-auth-card {
        width: 100%;
        max-width: 460px;
        border-radius: 24px;
        border: 1px solid rgba(15, 23, 42, 0.06);
        box-shadow: 0 20px 40px -10px rgba(15, 23, 42, 0.08);
        background: #ffffff;
        padding: 48px 40px;
    }

    .auth-heading {
        margin: 0 0 10px;
        font-family: "Sora", sans-serif;
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: #0f172a;
    }

    .auth-subheading {
        margin-bottom: 30px;
        color: #64748b;
        font-size: 0.96rem;
    }

    .auth-field {
        margin-bottom: 18px;
    }

    .auth-label {
        margin-bottom: 8px;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #64748b;
    }

    .auth-label-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
    }

    .auth-link {
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        text-decoration: none;
    }

    .auth-link:hover {
        color: #1d4ed8;
        text-decoration: underline;
    }

    .auth-input {
        width: 100%;
        background: #f8fafc;
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 12px;
        padding: 14px 16px;
        font-size: 0.95rem;
        color: #0f172a;
        transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .auth-input:focus {
        outline: none;
        background: #ffffff;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .auth-btn {
        width: 100%;
        border: none;
        border-radius: 12px;
        background: #0f172a;
        color: #ffffff;
        font-weight: 600;
        padding: 14px;
        margin-top: 4px;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .auth-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 24px -10px rgba(15, 23, 42, 0.5);
    }

    .auth-footnote {
        margin-top: 20px;
        text-align: center;
        color: #64748b;
        font-size: 0.88rem;
    }

    @media (max-width: 575.98px) {
        .premium-auth-card {
            padding: 36px 24px;
        }
    }
</style>
{% endblock %}

{% block content %}
<section class="premium-auth-shell">
    <div class="premium-auth-card">
        <h1 class="auth-heading">Welcome back</h1>
        <p class="auth-subheading">Sign in to continue to your PropSight workspace.</p>

        <form method="POST" action="{{ url_for('login') }}">
            {% if next_url %}
            <input type="hidden" name="next" value="{{ next_url }}">
            {% endif %}

            <div class="auth-field">
                <label class="auth-label" for="email">Email</label>
                <input id="email" type="email" name="email" class="auth-input" required autofocus>
            </div>

            <div class="auth-field">
                <div class="auth-label-row">
                    <label class="auth-label" for="password">Password</label>
                    <a href="{{ url_for('forgot_password') }}" class="auth-link">Forgot password?</a>
                </div>
                <input id="password" type="password" name="password" class="auth-input" required>
            </div>

            <button type="submit" class="auth-btn">Sign in</button>
        </form>

        <p class="auth-footnote">
            Don't have an account?
            <a href="{{ url_for('register') }}" class="auth-link">Create one</a>
        </p>
    </div>
</section>
{% endblock %}
