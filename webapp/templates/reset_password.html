{% extends "base.html" %}
{% block title %}Reset Password — PropSight{% endblock %}

{% block extra_head %}
<style>
    .premium-auth-shell {
        min-height: calc(100vh - 220px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 56px 16px;
        background: radial-gradient(circle at 0% 0%, rgba(37, 99, 235, 0.06), transparent 42%),
                    radial-gradient(circle at 100% 100%, rgba(15, 23, 42, 0.06), transparent 45%),
                    #f8fafc;
    }

    .premium-auth-card {
        width: 100%;
        max-width: 460px;
        border-radius: 24px;
        border: 1px solid rgba(15, 23, 42, 0.06);
        box-shadow: 0 20px 40px -10px rgba(15, 23, 42, 0.08);
        background: #ffffff;
        padding: 48px 40px;
    }

    .auth-heading {
        margin: 0 0 10px;
        font-family: "Sora", sans-serif;
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: #0f172a;
    }

    .auth-subheading {
        margin-bottom: 30px;
        color: #64748b;
        font-size: 0.96rem;
    }

    .auth-field {
        margin-bottom: 18px;
    }

    .auth-label {
        margin-bottom: 8px;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #64748b;
    }

    .auth-input {
        width: 100%;
        background: #f8fafc;
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 12px;
        padding: 14px 16px;
        font-size: 0.95rem;
        color: #0f172a;
        transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .auth-input:focus {
        outline: none;
        background: #ffffff;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .auth-btn {
        width: 100%;
        border: none;
        border-radius: 12px;
        background: #0f172a;
        color: #ffffff;
        font-weight: 600;
        padding: 14px;
        margin-top: 4px;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .auth-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 24px -10px rgba(15, 23, 42, 0.5);
    }

    .auth-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }

    .auth-footnote {
        margin-top: 20px;
        text-align: center;
        color: #64748b;
        font-size: 0.88rem;
    }

    .auth-link {
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        text-decoration: none;
    }

    .auth-link:hover {
        color: #1d4ed8;
        text-decoration: underline;
    }

    .auth-alert {
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 0.88rem;
        margin-bottom: 18px;
    }

    .auth-alert-error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #b91c1c;
    }

    .auth-alert-success {
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        color: #15803d;
    }

    @media (max-width: 575.98px) {
        .premium-auth-card {
            padding: 36px 24px;
        }
    }
</style>
{% endblock %}

{% block content %}
<section class="premium-auth-shell">
    <div class="premium-auth-card">
        <h1 class="auth-heading">Set new password</h1>
        <p class="auth-subheading">Choose a strong password for your PropSight account.</p>

        <div id="rp-alert" class="auth-alert auth-alert-error" style="display:none;"></div>

        <form id="rp-form">
            <div class="auth-field">
                <label class="auth-label" for="new-password">New Password</label>
                <input id="new-password" type="password" class="auth-input" placeholder="Min. 8 characters" required>
            </div>
            <div class="auth-field">
                <label class="auth-label" for="confirm-password">Confirm Password</label>
                <input id="confirm-password" type="password" class="auth-input" required>
            </div>
            <button type="submit" id="rp-btn" class="auth-btn">Update Password</button>
        </form>

        <p class="auth-footnote">
            <a href="{{ url_for('login') }}" class="auth-link">Back to login</a>
        </p>
    </div>
</section>

<script>
(function () {
    var accessToken = null;

    function showAlert(msg, type) {
        var el = document.getElementById("rp-alert");
        el.className = "auth-alert auth-alert-" + (type || "error");
        el.textContent = msg;
        el.style.display = "block";
    }

    document.addEventListener("DOMContentLoaded", function () {
        var hash = window.location.hash.slice(1);
        var params = {};
        hash.split("&").forEach(function (part) {
            var kv = part.split("=");
            if (kv.length === 2) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]);
        });

        accessToken = params["access_token"] || null;
        var type = params["type"] || null;

        if (type !== "recovery" || !accessToken) {
            showAlert("Invalid or expired link. Please request a new password reset.");
            document.getElementById("rp-form").style.display = "none";
            return;
        }
    });

    document.getElementById("rp-form").addEventListener("submit", function (e) {
        e.preventDefault();

        var newPassword = document.getElementById("new-password").value;
        var confirmPassword = document.getElementById("confirm-password").value;

        if (newPassword.length < 8) {
            showAlert("Password must be at least 8 characters.");
            return;
        }
        if (newPassword !== confirmPassword) {
            showAlert("Passwords do not match.");
            return;
        }

        var btn = document.getElementById("rp-btn");
        btn.disabled = true;
        btn.textContent = "Updating…";

        fetch("/api/reset-password", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({access_token: accessToken, new_password: newPassword}),
        })
        .then(function (res) { return res.json(); })
        .then(function (data) {
            if (data.success) {
                sessionStorage.setItem("flash_success", "Password updated. Please sign in.");
                window.location.href = "/login";
            } else {
                showAlert(data.error || "Failed to update password. Please try again.");
                btn.disabled = false;
                btn.textContent = "Update Password";
            }
        })
        .catch(function () {
            showAlert("Network error. Please try again.");
            btn.disabled = false;
            btn.textContent = "Update Password";
        });
    });
}());
</script>
{% endblock %}
