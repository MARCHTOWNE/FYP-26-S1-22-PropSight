{% extends "base.html" %}
{% block title %}Verify Email — HDB Resale Analytics{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-form">
        <div class="card">
            <div class="card-body p-4">
                <h4 class="text-center mb-2">
                    <i class="bi bi-envelope-check me-2 text-primary"></i>Verify Your Email
                </h4>
                <p class="text-center text-muted small mb-4">
                    We sent a 6-digit code to <strong>{{ email }}</strong>.<br>
                    Enter it below to complete registration. It expires in 10 minutes.
                </p>
                <form method="POST" action="{{ url_for('verify_email') }}">
                    <div class="mb-3">
                        <label class="form-label">Verification Code</label>
                        <input type="text" name="code" class="form-control form-control-lg text-center"
                               placeholder="000000" maxlength="6" pattern="\d{6}"
                               inputmode="numeric" autocomplete="one-time-code"
                               required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                        Verify &amp; Create Account
                    </button>
                </form>
                <p class="text-center mt-3 mb-0 small text-muted">
                    Wrong email?
                    <a href="{{ url_for('register') }}">Go back and register again</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
